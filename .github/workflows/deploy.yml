name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: 

jobs:
  lint-env:
    name: Lint .env.example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dotenv-linter
        run: curl -sSfL https://raw.githubusercontent.com/dotenv-linter/dotenv-linter/master/install.sh | sh -s -- -b /usr/local/bin
      - name: Lint .env.example
        run: dotenv-linter --skip UnorderedKey .env.example

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vibe-kanban-tools
          tags: |
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Nova
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NOVA_HOST }}
          username: ${{ secrets.NOVA_USER }}
          key: ${{ secrets.NOVA_SSH_KEY }}
          port: ${{ secrets.NOVA_SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.NOVA_CONFIG_PATH }}
            ./nova.sh update dev
